<!DOCTYPE html>
<html>
<body>
<script>
const isTop = (window === window.top);

const base = location.href.split('#')[0].split('?')[0];
let n = 0;
function gc() {
  try { SpecialPowers.forceGC(); } catch (e) {}
  try { SpecialPowers.forceCC(); } catch (e) {}
}
const nav = window.navigation;
let reenter = 0;
let stale = [];

function wreakHavoc() {
  if (reenter > 5) { return; }
  reenter++;
  try {
    switch ((Math.random() * 8) | 0) {
      case 0: nav.updateCurrentEntry({ state: { r: n++ } }); break;
      case 1: location.hash = "q" + (n++); break;
      case 2: history.pushState({}, "", "#p" + (n++)); break;
      case 3: history.replaceState({}, "", "#rp" + (n++)); break;
      case 4: {
        let es = nav.entries();
        stale.push(...es);
        for (const e of stale.slice(-8)) {
          try {
            let a = e.url, b = e.index, c = e.key;
            e.getState();
            e.dispatchEvent(new Event("x"));
          } catch (_) {}
        }
        break;
      }
      case 5:
        try {
          let c = nav.currentEntry;
          if (c) { c.ondispose = () => { wreakHavoc(); }; }
        } catch (e) {}
        break;
      case 6: try { nav.back(); } catch (e) {} break;
      case 7: try { nav.forward(); } catch (e) {} break;
    }
  } catch (e) {}
  reenter--;
  if (Math.random() < 0.6) { gc(); }
}

if (!isTop) {
  nav.addEventListener("currententrychange", (e) => {
    let f = e.from;
    if (f) { f.ondispose = () => { wreakHavoc(); }; }
    wreakHavoc();
  });
  nav.addEventListener("navigatesuccess", wreakHavoc);
  nav.addEventListener("navigateerror", wreakHavoc);
  try {
    history.pushState({}, "", "#i" + (n++));
    history.pushState({}, "", "#i" + (n++));
  } catch (e) {}
} else {
  let frames = [];
  function mk() {
    let f = document.createElement("iframe");
    f.src = base + "?f=" + (n++);
    document.body.appendChild(f);
    return f;
  }
  function act() {
    for (let i = 0; i < 3; i++) {
      try {
        if (frames.length < 7 && Math.random() < 0.5) { frames.push(mk()); }
        let f = frames[(Math.random() * frames.length) | 0];
        if (!f) { continue; }
        let w;
        try { w = f.contentWindow; } catch (e) { continue; }
        if (!w) { continue; }
        switch ((Math.random() * 9) | 0) {
          case 0: w.location.href = base + "?g=" + (n++); break;
          case 1: w.location.replace(base + "?r=" + (n++)); break;
          case 2: w.location.hash = "h" + (n++); break;
          case 3: try { w.history.back(); } catch (e) {} break;
          case 4: try { w.history.forward(); } catch (e) {} break;
          case 5:
            try {
              w.navigation.updateCurrentEntry({ state: { q: n++ } });
            } catch (e) {}
            break;
          case 6: try { w.navigation.back(); } catch (e) {} break;
          case 7:
            try {
              let es = w.navigation.entries();
              stale.push(...es);
            } catch (e) {}
            break;
          case 8:
            if (Math.random() < 0.25) {
              f.remove();
              frames = frames.filter((x) => x !== f);
            }
            break;
        }
      } catch (e) {}
    }
    for (const e of stale.slice(-10)) {
      try { let a = e.url, b = e.index; e.getState(); } catch (_) {}
    }
    if (stale.length > 300) { stale = stale.slice(-60); }
    if (Math.random() < 0.35) { gc(); }
  }
  let c = 0;
  function loop() {
    act();
    if (++c < 1500) {
      setTimeout(loop, 1);
    } else {
      gc();
    }
  }
  window.onload = () => {
    frames.push(mk(), mk(), mk());
    setTimeout(loop, 120);
  };
}
</script>
</body>
</html>
