[dtls-certificates.html]
  expected:
    if os == "mac": TIMEOUT
    if os == "android": [OK, TIMEOUT]
  [RTCPeerConnection establishes using rsa and rsa certificates]
    expected:
      if os == "mac": NOTRUN
      if os == "android": [PASS, TIMEOUT]

  [RTCPeerConnection establishes using rsa and ecdsa certificates]
    expected:
      if os == "mac": NOTRUN

  [RTCPeerConnection establishes using ecdsa and ecdsa certificates]
    expected:
      if os == "mac": TIMEOUT

  [RTCPeerConnection establishes using ecdsa and rsa certificates]
    expected:
      if os == "mac": NOTRUN
