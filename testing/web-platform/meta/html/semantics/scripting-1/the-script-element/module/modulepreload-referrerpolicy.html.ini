[modulepreload-referrerpolicy.html]
  [Modulepreload with unsafe-url policy should send full referrer]
    expected:
      if (processor == "x86_64") and not debug and (os == "linux") and fission and not asan and tsan: PASS
      if (processor == "x86_64") and not debug and (os == "linux") and fission and asan: PASS
      if (processor == "x86_64") and not debug and (os == "win"): PASS
      if (processor == "x86_64") and debug: PASS
      [PASS, FAIL]

  [Modulepreload with strict-origin policy should send origin-only referrer]
    expected:
      if (processor == "x86_64") and (os == "linux") and not debug and fission and not tsan: [PASS, FAIL]
      if (processor == "x86_64") and (os == "win") and debug: [PASS, FAIL]
      if (processor == "x86_64") and (os == "android") and debug: [PASS, FAIL]
      if (processor == "x86_64") and (os == "mac"): [PASS, FAIL]
      if (processor == "aarch64") and not debug: [PASS, FAIL]

  [Modulepreload with same-origin policy should send full referrer for same-origin requests]
    expected:
      if not fission and debug and (os == "android"): PASS
      if fission and not asan: PASS
      [PASS, FAIL]

  [Modulepreload with strict-origin-when-cross-origin policy should send full referrer for same-origin requests]
    expected:
      if (os == "win") and debug and (processor == "x86_64"): [PASS, FAIL]
      if (os == "linux") and debug and fission: [PASS, FAIL]
      if (os == "mac") and not debug: [PASS, FAIL]
      if (os == "android") and not debug: [PASS, FAIL]

  [Modulepreload with origin policy should send origin-only referrer]
    expected:
      if (os == "mac") and debug: [PASS, FAIL]
      if (os == "android") and not debug: [PASS, FAIL]
