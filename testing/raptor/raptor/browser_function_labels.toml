# Browser function labels (for profiles from samply)
#
# This file is intended to be used with `profiler-edit --insert-label-frames`,
# to create a "labeled" profile from a raw samply profile.
#
# See https://github.com/firefox-devtools/profiler/pull/5966 .
#
# This file has grown organically over the years. We add matchers whenever we
# notice a misclassified sample. This file will need to be updated in response
# to implementation changes, and whenever we try it on a new type of profile.
# For example, we've mostly been using this on profiles of a content process
# main thread running the Speedometer 3 benchmark. But you could also use it
# to classify samples on all threads / processes, to see the pure CPU time cost
# (rather than latency) by label.
#
# It's not always clear how "small" we should make the buckets, for example is
# it worth splitting HTML text node allocation from innerHTML parsing? Should
# we split Baseline IC compilation from JS execution?
# Often, what informs whether something is split or grouped is determined by
# whether the same split can be applied across browsers. If e.g. Chrome doesn't
# have an equivalent for Baseline IC compilation, splitting it out would make
# comparisons across engines less meaningful.

[[auto_labels]]
nameTemplate = "{Class}.{method}"
funcPrefixTemplates = [
  "mozilla::dom::{Class}_Binding::{method}(",
  "blink::`anonymous namespace'::v8_{Class:blink_snake}::{method:pascal}Operation",
  "blink::(anonymous namespace)::v8_{Class:blink_snake}::{method:pascal}Operation",
  "WebCore::js{Class}PrototypeFunction_{method}",
]

