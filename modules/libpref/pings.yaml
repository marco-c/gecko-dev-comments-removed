$schema: moz://mozilla.org/schemas/glean/pings/2-0-0

prefs-file-invalid:
  description: |
    A ping representing prefs files that failed to parse correctly.
    This ping does not include client_id for privacy.
    Only collected in Nightly builds.
  include_client_id: false
  metadata:
    include_info_sections: false
    uploader_capabilities:
      - ohttp
  bugs:
    - https://bugzilla.mozilla.org/show_bug.cgi?id=2004956
  data_reviews:
    - https://bugzilla.mozilla.org/show_bug.cgi?id=2004956
  notification_emails:
    - gstoll@mozilla.com
