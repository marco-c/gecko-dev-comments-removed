[DEFAULT]
firefox-appdir = "browser"

["test_nsILockstore.js"]
# Multiple tasks run several 800k-iteration PBKDF2 derivations back-to-back
# for PrimaryPassword set / change / unlock cycles; the cumulative wall
# time exceeds the default per-test budget on slower hardware.
requesttimeoutfactor = 5
# `test-verify` re-runs the test repeatedly to detect new intermittents.
# Under TSan the PBKDF2 derivations are slow enough that even the 5x
# factor above isn't sufficient to fit the verify loop into its budget,
# and the framework times out (bug 1892964). Regular TSan runs still
# cover the Rust/FFI surface; only the verify-on-TSan combo is skipped.
skip-if = ["tsan && verify"]
