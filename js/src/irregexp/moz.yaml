schema: 1

bugzilla:
  product: Core
  component: "JavaScript Engine"

origin:
  name: irregexp
  description: A fast regular expression engine from V8
  url: https://v8.dev

  release: e88e94638bf0e99430828b1b27251b7e2db15147 (Mon May 25 16:44:59 2026).
  revision: e88e94638bf0e99430828b1b27251b7e2db15147

  license: BSD-3-Clause
  license-file: LICENSE.v8

vendoring:
  url: https://chromium.googlesource.com/v8/v8.git
  source-hosting: googlesource
  vendor-directory: js/src/irregexp/
  skip-vendoring-steps: ['fetch', 'move-contents']
  patches:
    - patches/public-regexp-destructor.patch
    - patches/icu4x.patch
    - patches/remove-using-enum.patch
    - patches/regexp-tracer-unique-ptr.patch
    - patches/fix-include.patch
    - patches/disable-bytecode-analysis.patch
    - patches/unused-variables.patch

  update-actions:
    - action: run-script
      script: 'import-irregexp.py'
      cwd: '{yaml_dir}'

updatebot:
  maintainer-phab: iain
  maintainer-bz: iireland@mozilla.com
  try-preset: sm-shell
  tasks:
    - type: vendoring
      enabled: True
      frequency: 1 week
