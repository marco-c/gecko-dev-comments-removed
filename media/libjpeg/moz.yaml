schema: 1

bugzilla:
  product: "Core"
  component: "Graphics: ImageLib"

origin:
  name: "libjpeg-turbo"
  description: "JPEG image codec with SIMD acceleration"

  url: "https://libjpeg-turbo.org"
  license: ['IJG', 'BSD-3-Clause']

  release: 3.0.4 (2024-09-14T11:10:59-04:00).

  revision: "3.0.4"

  license-file: LICENSE.md

updatebot:
  maintainer-phab: tnikkel
  maintainer-bz: tnikkel@gmail.com
  tasks:
    - type: vendoring
      enabled: True
      needinfo: ["tnikkel@gmail.com"]

vendoring:
  url: https://github.com/libjpeg-turbo/libjpeg-turbo
  source-hosting: github
  tracking: tag

  exclude:
    # Build system support files
    - cmakescripts
    - jconfig.txt
    - libjpeg.map.in
    # Documentation
    - BUILDING.md
    - change.log
    - coderules.txt
    - doxygen-extra.css
    - doxygen.config
    - libjpeg.txt
    - structure.txt
    - usage.txt
    - wizard.txt
    # Man pages
    - cjpeg.1
    - djpeg.1
    - jpegtran.1
    - rdjpgcom.1
    - wrjpgcom.1
    # Test files
    - croptest.in
    - jcstest.c
    - strtest.c
    - tjbenchtest.in
    - tjexampletest.in
    # Standalone utility programs and TurboJPEG API (not used by Firefox)
    - bmpsizetest.c
    - cdjpeg.c
    - cdjpeg.h
    - cderror.h
    - cjpeg.c
    - cmyk.h
    - djpeg.c
    - example.c
    - jdatadst-tj.c
    - jdatasrc-tj.c
    - jpegtran.c
    - rdbmp.c
    - rdcolmap.c
    - rdgif.c
    - rdjpgcom.c
    - rdppm.c
    - rdswitch.c
    - rdtarga.c
    - tjbench.c
    - tjexample.c
    - tjunittest.c
    - tjutil.c
    - tjutil.h
    - transupp.c
    - transupp.h
    - turbojpeg.c
    - turbojpeg-jni.c
    - turbojpeg-mapfile
    - turbojpeg-mapfile.jni
    - turbojpeg-mp.c
    - turbojpeg.h
    - wrbmp.c
    - wrgif.c
    - wrjpgcom.c
    - wrppm.c
    - wrtarga.c
    # Directories not needed in the Firefox tree
    - doc
    - fuzz
    - java
    - jna
    - md5
    - release
    - sharedlib
    - testimages
    - win

  keep:
    - jconfig.h
    - jconfigint.h
    - jversion.h
    - simd/arm/neon-compat.h
    - MOZCHANGES
    - update.py

  patches:
    - mozilla.diff

  post-patch-actions:
    - action: run-script
      script: '{yaml_dir}/update.py'
      cwd: '{yaml_dir}'
