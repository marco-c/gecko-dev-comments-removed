[DEFAULT]
prefs = [
  "browser.ml.logLevel=Info",
]
support-files = [
  "head.js",
  "page.pdf",
]

["browser_dom_extractor.js"]
skip-if = [
  "os == 'linux' && os_version == '22.04' && arch == 'x86_64' && display == 'wayland' && standalone", # Bug 2013672
  "os == 'linux' && os_version == '24.04' && arch == 'x86_64' && display == 'x11' && standalone", # Bug 2013672
]

["browser_dom_extractor_pdf.js"]

["browser_dom_extractor_reader_mode.js"]
skip-if = [
  "os == 'mac' && os_version == '15.30' && arch == 'aarch64' && opt", # Bug 1996139
]

["browser_headless_extractor.js"]
skip-if = [
  "os == 'mac' && os_version == '15.30' && arch == 'aarch64'", # Bug 2004856
]

["browser_page_metadata.js"]

["browser_viewport_extractor.js"]

skip-if = [
  "os == 'mac' && os_version == '15.30' && arch == 'aarch64'", # Bug 2023967
]
