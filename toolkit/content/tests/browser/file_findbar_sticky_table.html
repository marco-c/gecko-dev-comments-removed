<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
body { margin: 0; }
table { border-collapse: collapse; width: 100%; }
thead {
  position: sticky;
  top: 0;
  left: 0;
  z-index: 2;
  background: white;
}
td:first-child, th:first-child {
  position: sticky;
  top: 0;
  left: 0;
  z-index: 1;
  background: white;
}
td, th { padding: 8px; border: 1px solid #ccc; }
</style>
</head>
<body>
<table>
  <thead>
    <tr><th>Name</th><th>Data</th></tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>
<script>
const tbody = document.getElementById("tbody");
const TARGET_ROW = 50;
const ROWS = 200;
for (let i = 0; i < ROWS; i++) {
  const tr = document.createElement("tr");
  const name = i === TARGET_ROW ? "StickyTableTarget" : `Row${i}`;
  tr.innerHTML = `<td>${name}</td><td>data</td>`;
  tbody.appendChild(tr);
}
</script>
</body>
</html>
